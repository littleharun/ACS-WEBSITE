<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ENROLLMANT</title>
  <link rel="shortcut icon" href="/images/ACS.jpg" type="image/x-icon">
  <style>
    .enroll-section {
      padding: 100px 0;
      background: #f3f4f6;
    }

    .enroll-container {
      width: min(1100px, 92%);
      margin: auto;
      background: white;
      padding: 40px;
      border-radius: 20px;
      color: #111827;
    }

    .enroll-container h2 {
      margin-bottom: 30px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      margin-bottom: 20px;
    }

    .form-group label {
      margin-bottom: 8px;
      font-weight: 600;
    }

    .form-group input,
    .form-group select {
      padding: 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 15px;
    }

    .full-width {
      width: 100%;
    }

    .notice {
      background: #fff3a0;
      color: #111;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .pay-amount {
      color: red;
      font-size: 22px;
      font-weight: 700;
      margin: 20px 0;
    }

    .checkbox {
      display: block;
      margin-bottom: 20px;
    }

    @media(max-width:768px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      .enroll-container {
        padding: 25px;
      }
    }

    .proceed-btn {
      background: #28a745;
      color: white;
      border: none;
      padding: 12px 28px;
      font-size: 16px;
      font-weight: 500;
      border-radius: 3px;
      cursor: pointer;
      display: inline-block;
      transition: background 0.2s ease;
    }

    .proceed-btn:hover {
      background: #218838;
    }
  </style>
</head>

<body>
  <section id="enroll-form" class="enroll-section">
    <div class="enroll-container">

      <h2>Please fill up your Informations correctly</h2>

      <form>

        <div class="form-grid">

          <div class="form-group">
            <label>Name</label>
            <input type="text" placeholder="Your Name">
          </div>

          <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="example@gmail.com">
          </div>

          <div class="form-group">
            <label>Institute</label>
            <input type="text" placeholder="Dhaka Residential Model College">
          </div>

          <div class="form-group">
            <label>HSC Batch</label>
            <select>
              <option>HSC'25</option>
              <option>HSC'26</option>
              <option>HSC'27</option>
            </select>
          </div>

          <div class="form-group">
            <label>Your Phone Number</label>
            <input type="text" placeholder="+880">
          </div>

          <div class="form-group">
            <label>Product Price</label>
            <input type="text" value="5500" readonly>
          </div>

          <div class="form-group">
            <label>Student Name</label>
            <input type="text" placeholder="Full Name">
          </div>

          <div class="form-group">
            <label>Contact Number For Delivery</label>
            <input type="text" placeholder="+8801XXXXXXXXX">
          </div>

        </div>

        <div class="form-group full-width">
          <label>Address</label>
          <input type="text" placeholder="Street address for delivery">
        </div>

        <div class="notice">
          *The ordered book will be sent to your address via courier.
        </div>

        <div class="form-grid">

          <div class="form-group">
            <label>District</label>
            <select>
              <option>-- Select District --</option>
              <option value="BARGUNA">BARGUNA</option>
              <option value="BARISAL">BARISAL</option>
              <option value="BHOLA">BHOLA</option>
              <option value="JHALOKATI">JHALOKATI</option>
              <option value="PATUAKHALI">PATUAKHALI</option>
              <option value="PIROJPUR">PIROJPUR</option>
              <option value="BANDARBAN">BANDARBAN</option>
              <option value="BRAHMANBARIA">BRAHMANBARIA</option>
              <option value="CHANDPUR">CHANDPUR</option>
              <option value="CHITTAGONG">CHITTAGONG</option>
              <option value="COMILLA">COMILLA</option>
              <option value="COX'S BAZAR">COX'S BAZAR</option>
              <option value="FENI">FENI</option>
              <option value="KHAGRACHHARI">KHAGRACHHARI</option>
              <option value="LAKSHMIPUR">LAKSHMIPUR</option>
              <option value="NOAKHALI">NOAKHALI</option>
              <option value="RANGAMATI">RANGAMATI</option>
              <option value="DHAKA">DHAKA</option>]
              <option value="FARIDPUR">FARIDPUR</option>
              <option value="GAZIPUR">GAZIPUR</option>
              <option value="GOPALGANJ">GOPALGANJ</option>
              <option value="JAMALPUR">JAMALPUR</option>
              <option value="KISHOREGONJ">KISHOREGONJ</option>
              <option value="MADARIPUR">MADARIPUR</option>
              <option value="MANIKGANJ">MANIKGANJ</option>
              <option value="MUNSHIGANJ">MUNSHIGANJ</option>
              <option value="MYMENSINGH">MYMENSINGH</option>
              <option value="NARAYANGANJ">NARAYANGANJ</option>
              <option value="NARSINGDI">NARSINGDI</option>
              <option value="NETRAKONA">NETRAKONA</option>
              <option value="RAJBARI">RAJBARI</option>
              <option value="SHARIATPUR">SHARIATPUR</option>
              <option value="SHERPUR">SHERPUR</option>
              <option value="TANGAIL">TANGAIL</option>
              <option value="OTHER">OTHER</option>
            </select>
          </div>

          <div class="form-group">
            <label>Upazila</label>
            <select>
              <option>-- Select Upazila --</option>
              <option value="BHALUKA">BHALUKA</option>
              <option value="DHOBAURA">DHOBAURA</option>
              <option value="FULBARIA">FULBARIA</option>
              <option value="GAFFARGAON">GAFFARGAON</option>
              <option value="GAURIPUR">GAURIPUR</option>
              <option value="HALUAGHAT">HALUAGHAT</option>
              <option value="ISHWARGANJ">ISHWARGANJ</option>
              <option value="MYMENSINGH SADAR">MYMENSINGH SADAR</option>
              <option value="MUKTAGACHHA">MUKTAGACHHA</option>
              <option value="NANDAIL">NANDAIL</option>
              <option value="PHULPUR">PHULPUR</option>
              <option value="TRISHAL">TRISHAL</option>
              <option value="OTHER">OTHER</option>
            </select>
          </div>

        </div>

        <p class="pay-amount">
          You have to pay 5500 ৳
        </p>

        <label class="checkbox">
          <input type="checkbox">

          All the informations are correct &amp; I agree all the
        </label>

        <a href="payment.html" class="proceed-btn">
          Proceed Payment
        </a>

      </form>

    </div>
  </section>
</body>

</html>
